services:
  web:
    build: .
    ports:
      - "8000:5000"
    volumes:
      - .:/app
    depends_on:
      - db
  db:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flaskuser"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: flaskuser
      POSTGRES_PASSWORD: flaskpass
      POSTGRES_DB: flaskdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
